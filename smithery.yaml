startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      LLM_ROUTER_CLAUDE_SUBSCRIPTION:
        type: string
        title: Claude Code subscription mode
        description: >
          Set 'true' if you use Claude Code via subscription (recommended for most users).
          Routes simple tasks to Haiku/Sonnet within your subscription at no extra cost.
          No API keys required when this is enabled.
        default: "true"
        enum: ["true", "false"]
      OPENAI_API_KEY:
        type: string
        title: OpenAI API key
        description: "Enables GPT-4o, o3, DALL-E, and Whisper. Optional."
        default: ""
      GEMINI_API_KEY:
        type: string
        title: Gemini API key
        description: "Enables Gemini Flash (ultra-cheap queries, ~$0.00001) and Gemini Pro. Optional."
        default: ""
      PERPLEXITY_API_KEY:
        type: string
        title: Perplexity API key
        description: "Enables web-grounded research routing (Sonar Pro). Recommended for research tasks. Optional."
        default: ""
      GROQ_API_KEY:
        type: string
        title: Groq API key
        description: "Fast, free-tier inference for budget tasks. Optional."
        default: ""
      DEEPSEEK_API_KEY:
        type: string
        title: DeepSeek API key
        description: "High-quality coding at 10x lower cost than GPT-4o. Optional."
        default: ""
      MISTRAL_API_KEY:
        type: string
        title: Mistral API key
        description: "European alternative for code and analysis tasks. Optional."
        default: ""
      ANTHROPIC_API_KEY:
        type: string
        title: Anthropic API key
        description: "Only needed if NOT using Claude Code subscription. Leave blank for subscription users. Optional."
        default: ""
      FAL_KEY:
        type: string
        title: fal.ai API key
        description: "Enables image generation (Flux Pro/Schnell) and video/audio models. Optional."
        default: ""
      OLLAMA_BASE_URL:
        type: string
        title: Ollama base URL
        description: "Run models locally for free. Example: http://localhost:11434. Leave blank to skip. Optional."
        default: ""
      LLM_ROUTER_PROFILE:
        type: string
        title: Routing profile
        description: >
          Controls routing aggressiveness.
          no_pressure = prefer subscription models.
          balanced = mix subscription + external.
          high_pressure = maximize use of cheapest available model.
        default: "no_pressure"
        enum: ["no_pressure", "balanced", "high_pressure"]
    required: []
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["claude-code-llm-router"],
      env: Object.fromEntries(
        Object.entries(config).filter(([_, v]) => v !== "" && v !== null && v !== undefined)
      )
    })
