<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Building llm-router: An Honest Developer Journey with Claude AI</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0d1117;
      color: #c9d1d9;
      overflow: hidden;
      line-height: 1.6;
    }

    .presentation {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .slides {
      width: 100%;
      height: 100%;
      position: relative;
      perspective: 1000px;
    }

    .slide {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: clamp(2rem, 8vw, 4rem);
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      opacity: 0;
      transform: translateX(100%);
      transition: opacity 0.6s ease, transform 0.6s ease;
      overflow: hidden;
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0);
      z-index: 10;
    }

    .slide.prev {
      transform: translateX(-100%);
    }

    /* Title slide */
    .slide.title-slide {
      background: linear-gradient(135deg, #0d1117 0%, #1f6feb 50%, #0d1117 100%);
      text-align: center;
    }

    .slide h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      margin-bottom: 1rem;
      color: #58a6ff;
      letter-spacing: -0.02em;
    }

    .slide h2 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #79c0ff;
    }

    .slide .subtitle {
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      color: #8b949e;
      font-weight: 400;
      margin-bottom: 2rem;
    }

    .slide .tagline {
      font-size: clamp(1rem, 1.5vw, 1.3rem);
      color: #6e7681;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Hero slides with count-up */
    .hero-number {
      font-size: clamp(3.5rem, 10vw, 6rem);
      font-weight: 700;
      color: #00ff88;
      margin-bottom: 0.5rem;
      font-variant-numeric: tabular-nums;
    }

    .hero-unit {
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      color: #58a6ff;
      margin-bottom: 1.5rem;
    }

    /* Content slides */
    .slide.content-slide {
      justify-content: flex-start;
      padding-top: clamp(3rem, 8vh, 5rem);
      text-align: left;
    }

    .content-slide h2 {
      color: #58a6ff;
      margin-bottom: 2rem;
      align-self: flex-start;
      width: 100%;
    }

    .slide-content {
      width: 100%;
      max-width: 900px;
      font-size: clamp(0.95rem, 1.5vw, 1.1rem);
      line-height: 1.7;
    }

    .slide-content h3 {
      color: #79c0ff;
      margin-top: 1.5rem;
      margin-bottom: 0.8rem;
      font-size: clamp(1rem, 1.8vw, 1.3rem);
    }

    .slide-content ul {
      list-style: none;
      margin-left: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .slide-content li {
      margin-bottom: 0.7rem;
      position: relative;
      padding-left: 1.2rem;
    }

    .slide-content li:before {
      content: "▸";
      position: absolute;
      left: 0;
      color: #00ff88;
    }

    .slide-content strong {
      color: #79c0ff;
      font-weight: 600;
    }

    /* Chart slides */
    .chart-container {
      width: 100%;
      max-width: 800px;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 2rem auto;
      position: relative;
    }

    canvas {
      max-height: 400px;
      max-width: 100%;
    }

    .chart-subtitle {
      font-size: clamp(0.9rem, 1.3vw, 1rem);
      color: #8b949e;
      margin-top: 1rem;
      text-align: center;
    }

    /* Navigation */
    .nav {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      gap: 1rem;
      z-index: 100;
    }

    .nav-btn {
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid #58a6ff;
      color: #58a6ff;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font-family: 'JetBrains Mono', monospace;
    }

    .nav-btn:hover {
      background: rgba(88, 166, 255, 0.2);
      border-color: #79c0ff;
    }

    .progress {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      font-size: 0.9rem;
      color: #8b949e;
      z-index: 100;
    }

    /* Speaker notes */
    .notes {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 100%;
      background: rgba(13, 17, 23, 0.95);
      color: #c9d1d9;
      padding: 2rem;
      overflow-y: auto;
      display: none;
      z-index: 50;
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .notes.active {
      display: block;
    }

    .notes-title {
      color: #58a6ff;
      font-size: 1.3rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .notes-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      border: 1px solid #58a6ff;
      color: #58a6ff;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      border-radius: 4px;
    }

    .notes-close:hover {
      background: rgba(88, 166, 255, 0.1);
    }

    /* Animations */
    @keyframes countUp {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .slide.active .hero-number {
      animation: countUp 0.6s ease-out;
    }

    @media (prefers-reduced-motion: reduce) {
      .slide {
        transition: none;
      }
      .slide.active .hero-number {
        animation: none;
      }
    }

    /* Accessibility */
    @media (max-width: 768px) {
      .slide {
        padding: 1.5rem;
      }
      .nav {
        bottom: 1rem;
        right: 1rem;
      }
      .progress {
        bottom: 1rem;
        left: 1rem;
      }
    }

    @media print {
      .nav, .progress, .notes {
        display: none;
      }
      .slide {
        page-break-after: always;
        opacity: 1;
        transform: none !important;
        position: relative !important;
      }
    }
  </style>
</head>
<body>
  <div class="presentation">

    <div class="nav">
      <button class="nav-btn" id="prev">←</button>
      <button class="nav-btn" id="next">→</button>

    </div>
    <div class="notes" id="notes">
      <button class="notes-close" onclick="document.getElementById('notes').classList.remove('active')">Close</button>
      <div class="notes-title">Speaker Notes</div>
      <div id="notes-content"></div>
    </div>
  </div>

  <script>

      {

      {

        chartType: 'doughnut',
        subtitle: '100 sessions analyzed | Top friction: buggy_code (35×), wrong_approach (25×), rate_limited (9×)',

      {

        content: `
          <h3>v3 (8 releases) — Foundation</h3>

          <h3>v4 (3 releases) — Session spend tracking</h3>
          <p>Real-time cost awareness per session</p>

      {

      },
      {
        number: 10,
        type: 'content',
        title: 'Automation = Confidence',
        content: `
          <h3>Continuous Testing</h3>
          <ul>
            <li>Pytest: 150+ tests, 80%+ coverage required</li>

        notes: 'This was controversial. Some said "Codex is dead, use latest models." But the math was clear: 2,020 free calls. Yes, Codex is sometimes slower. Yes, GPT-5.4 is good but not magic. Free is free. We built fallback chains so Codex failures drop to next model—best of both worlds.'
      },
      {
        number: 12,

        title: 'Win: Memory System',

      },
      {
        number: 13,
        type: 'content',
        title: 'Win: Plan Mode + Decision Log',
        content: `
          <h3>Plan Mode Workflow</h3>
          <p>Explore code → Design approach → Get approval → Build<br>Rework dropped from 40% of time to 15%</p>
          <h3>Decision Log</h3>
          <p>Every significant choice: what was decided, alternatives, outcome<br>Traceable from Claude prompt → design → code → production</p>
          <h3>Audit Trail</h3>
          <p>When something breaks: read decision log to understand original constraint<br>Prevents repeat failures</p>
        `,
        notes: 'Plan Mode forced upfront conversation. "This is what I think, does it match your intent?" caught misalignment before code. Decision log meant no institutional knowledge loss. Alternatives forced us to articulate tradeoffs, not just "this is the best way"—context for future maintainers.'
      },
      {
        number: 14,
        type: 'chart',
        title: 'Friction Map',
        chartType: 'friction',
        notes: 'Buggy code is not a test failure. Tests pass, code runs, but logic is wrong. Wrong approach means we designed it right but picked the wrong tool or pattern. These friction points teach us more than our wins.'
      },
      {
        number: 15,
        type: 'hero',
        title: 'The Hook Deadlock',
        heroNumber: '6+',
        heroUnit: 'sessions destroyed',
        subtitle: 'Enforcement hooks that blocked core tools created unrecoverable deadlock',
        content: `
          <h3>The Trap</h3>
          <ol style="list-style: decimal; margin-left: 1.5rem;">
            <li>Hook blocks Read/Edit (to enforce routing)</li>

      },

    let currentSlide = 0;

    // Initialize
    function init() {
      renderSlides();
      document.getElementById('total').textContent = slides.length;
      showSlide(0);
    }

    // Render all slides
    function renderSlides() {
      const container = document.getElementById('slides');
      slides.forEach((slide, index) => {
        const el = createSlideElement(slide);
        container.appendChild(el);
      });
    }

    // Create slide element
    function createSlideElement(slide) {
      const div = document.createElement('div');
      div.className = 'slide';

      if (slide.type === 'title') {
        div.classList.add('title-slide');
        div.innerHTML = `
          <h1>${slide.title}</h1>
          <p class="subtitle">${slide.subtitle}</p>
        `;
      } else if (slide.type === 'hero') {
        div.innerHTML = `
          <h2>${slide.title}</h2>
          <div class="hero-number">${slide.heroNumber}</div>
          <div class="hero-unit">${slide.heroUnit}</div>
          ${slide.subtitle ? `<p class="subtitle">${slide.subtitle}</p>` : ''}
          ${slide.content ? `<div class="slide-content">${slide.content}</div>` : ''}
        `;
      } else if (slide.type === 'chart') {
        div.innerHTML = `
          <h2>${slide.title}</h2>
          <div class="chart-container">
            <canvas id="chart-${slide.number}"></canvas>
          </div>
          ${slide.subtitle ? `<p class="chart-subtitle">${slide.subtitle}</p>` : ''}
        `;
      } else {
        div.classList.add('content-slide');
        div.innerHTML = `
          <h2>${slide.title}</h2>
          <div class="slide-content">${slide.content}</div>
        `;
      }

      return div;
    }

    // Show specific slide
    function showSlide(n) {
      const slides = document.querySelectorAll('.slide');

      if (n >= slides.length) {
        currentSlide = slides.length - 1;
      } else if (n < 0) {
        currentSlide = 0;
      } else {
        currentSlide = n;
      }

      slides.forEach((slide, i) => {
        slide.classList.remove('active', 'prev');
        if (i === currentSlide) {
          slide.classList.add('active');
          renderChart(i);
        } else if (i < currentSlide) {
          slide.classList.add('prev');
        }
      });

      document.getElementById('current').textContent = currentSlide + 1;
      updateNotes();
    }

    // Update speaker notes
    function updateNotes() {
      const slide = slides[currentSlide];
      document.getElementById('notes-content').textContent = slide.notes;
    }

    // Render charts
    function renderChart(slideIndex) {
      const slide = slides[slideIndex];
      if (slide.type !== 'chart') return;

      const canvasId = `chart-${slide.number}`;
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      // Destroy existing chart
      if (canvas.chart) {
        canvas.chart.destroy();
      }

      let chartConfig;
      if (slide.chartType === 'line') {
        chartConfig = {
          type: 'line',
          data: {
            labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5', 'Day 6', 'Day 7', 'Day 8', 'Day 9', 'Day 10', 'Day 11', 'Day 12', 'Day 13', 'Day 14'],
            datasets: [{
              label: 'Cumulative Releases',
              data: [3, 7, 11, 16, 21, 25, 30, 34, 38, 42, 45, 48, 50, 51],
              borderColor: '#00ff88',
              backgroundColor: 'rgba(0, 255, 136, 0.1)',
              fill: true,
              tension: 0.4,
              pointRadius: 5,
              pointBackgroundColor: '#00ff88',
              pointBorderColor: '#0d1117',
              pointBorderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: '#c9d1d9', font: { family: "'JetBrains Mono'" } }
              }
            },
            scales: {
              y: {
                grid: { color: 'rgba(139, 148, 158, 0.1)' },
                ticks: { color: '#8b949e' }
              },
              x: {
                grid: { color: 'rgba(139, 148, 158, 0.1)' },
                ticks: { color: '#8b949e' }
              }
            }
          }
        };
      } else if (slide.chartType === 'bar') {
        chartConfig = {
          type: 'bar',
          data: {
            labels: ['Codex\ngpt-5.4', 'Gemini\nFlash', 'GPT-4o\nmini', 'GPT-4o', 'Ollama\nLocal', 'Haiku\nSub', 'Gemini\nPro'],
            datasets: [{
              label: 'API Calls',
              data: [2020, 1846, 1663, 1170, 822, 48, 146],
              backgroundColor: ['#00ff00', '#ffa500', '#ff6b6b', '#ff4444', '#00ff00', '#00ff88', '#ffa500'],
              borderColor: 'rgba(255, 255, 255, 0.1)',
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: undefined,
            plugins: {
              legend: {
                labels: { color: '#c9d1d9', font: { family: "'JetBrains Mono'" } }
              }
            },
            scales: {
              y: {
                grid: { color: 'rgba(139, 148, 158, 0.1)' },
                ticks: { color: '#8b949e' }
              },
              x: {
                grid: { color: 'rgba(139, 148, 158, 0.1)' },
                ticks: { color: '#8b949e' }
              }
            }
          }
        };
      } else if (slide.chartType === 'doughnut') {
        chartConfig = {
          type: 'doughnut',
          data: {
            labels: ['Fully Achieved', 'Mostly Achieved', 'Partially Achieved', 'Not Achieved'],
            datasets: [{
              data: [30, 33, 24, 10],
              backgroundColor: ['#00ff88', '#88ff00', '#ffaa00', '#ff4444']
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: '#c9d1d9', font: { family: "'JetBrains Mono'" } }
              }
            }
          }
        };
      } else if (slide.chartType === 'friction') {
        chartConfig = {
          type: 'bar',
          data: {
            labels: ['Buggy Code', 'Wrong Approach', 'Rate Limited', 'Tool Blocked', 'Config Drift'],
            datasets: [{
              label: 'Incident Count',
              data: [35, 25, 9, 5, 8],
              backgroundColor: ['#ff4444', '#ffaa00', '#ff6b6b', '#ff8800', '#ffcc00'],
              borderColor: 'rgba(255, 255, 255, 0.1)',
              borderWidth: 1
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: '#c9d1d9', font: { family: "'JetBrains Mono'" } }
              }
            },
            scales: {
              x: {
                grid: { color: 'rgba(139, 148, 158, 0.1)' },
                ticks: { color: '#8b949e' }
              },
              y: {
                grid: { color: 'rgba(139, 148, 158, 0.1)' },
                ticks: { color: '#8b949e' }
              }
            }
          }
        };
      }

      const ctx = canvas.getContext('2d');
      canvas.chart = new Chart(ctx, chartConfig);
    }

    // Event listeners
    document.getElementById('next').addEventListener('click', () => showSlide(currentSlide + 1));
    document.getElementById('prev').addEventListener('click', () => showSlide(currentSlide - 1));
    document.getElementById('notes-toggle').addEventListener('click', () => {
      document.getElementById('notes').classList.toggle('active');
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        showSlide(currentSlide + 1);
        e.preventDefault();
      } else if (e.key === 'ArrowLeft') {
        showSlide(currentSlide - 1);
        e.preventDefault();
      } else if (e.key === 'n' || e.key === 's') {
        document.getElementById('notes').classList.toggle('active');
        e.preventDefault();
      }
    });

    // Initialize
    init();
  </script>
</body>
</html>
