[project]
name = "llm-router"
version = "0.1.0"
description = "Multi-LLM router MCP server — route tasks to Gemini, GPT, Perplexity with configurable profiles"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "litellm>=1.50.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "aiosqlite>=0.20.0",
]

[project.scripts]
llm-router = "llm_router.server:main"
llm-router-onboard = "llm_router.onboard:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/llm_router"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py310"
