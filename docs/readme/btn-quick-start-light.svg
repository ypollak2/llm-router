<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 36" fill="none">
  <style>
    @keyframes btnShine {
      0%, 100% { stroke-opacity: 0.5; }
      50% { stroke-opacity: 1; }
    }
    .btn-border { animation: btnShine 3s ease-in-out infinite; }
  </style>
  <rect class="btn-border" width="120" height="36" rx="18" fill="#4F46E5" opacity="0.1" stroke="#4F46E5" stroke-width="1"/>
  <text x="60" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#4F46E5">Quick Start</text>
</svg>