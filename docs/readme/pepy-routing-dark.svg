<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 890 240" fill="none">
  <style>
    @keyframes panelIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.16); opacity: 1; }
    }
    @keyframes releaseGlow {
      0%, 100% { opacity: 0.06; }
      50% { opacity: 0.16; }
    }
    @keyframes gridFade {
      0%, 100% { opacity: 0.22; }
      50% { opacity: 0.36; }
    }
    .panel { animation: panelIn 0.55s ease-out both; }
    .grid { animation: gridFade 4s ease-in-out infinite; }
    .total-line {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawLine 1.5s ease-out 0.05s forwards;
    }
    .v8-line {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawLine 1.5s ease-out 0.22s forwards;
    }
    .v7-line {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawLine 1.5s ease-out 0.38s forwards;
    }
    .release-band { animation: releaseGlow 3.2s ease-in-out infinite; }
    .dot-total { animation: pulseDot 2.4s ease-in-out infinite; transform-origin: 854.0px 178.4px; }
    .dot-v8 { animation: pulseDot 2.4s ease-in-out 0.4s infinite; transform-origin: 854.0px 194.0px; }
    .dot-v7 { animation: pulseDot 2.4s ease-in-out 0.8s infinite; transform-origin: 854.0px 178.4px; }
  </style>

  <rect class="panel" width="890" height="240" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="1" y="1" width="888" height="238" rx="15" fill="none" stroke="#30363d" stroke-opacity="0.35"/>

  <rect x="24" y="22" width="220" height="196" rx="14" fill="#0d1117" stroke="#30363d" stroke-opacity="0.6"/>
  <text x="42" y="54" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b949e">RENAMED PACKAGE</text>
  <text x="42" y="84" font-family="system-ui, sans-serif" font-size="34" font-weight="800" fill="#e6edf3">654</text>
  <text x="42" y="106" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">llm-routing installs shown from Apr 28 to May 4</text>
  <text x="42" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">New Pepy page after the rename, with</text>
  <text x="42" y="147" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">the first week of llm-routing history.</text>

  <rect x="42" y="166" width="78" height="26" rx="13" fill="#F87171" opacity="0.12" stroke="#F87171" stroke-width="0.8"/>
  <text x="81" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#F87171">0</text>
  <text x="81" y="201" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">8.x</text>

  <rect x="132" y="166" width="78" height="26" rx="13" fill="#FBBF24" opacity="0.12" stroke="#FBBF24" stroke-width="0.8"/>
  <text x="171" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FBBF24">654</text>
  <text x="171" y="201" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">7.x</text>

  <text x="42" y="217" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">Pepy metadata can update before daily 8.x points do.</text>

  <text x="280" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b949e">INTERACTIVE PEPY SPLIT</text>
  <text x="280" y="214" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">Total, 8.x, and 7.x daily downloads on the renamed llm-routing package page.</text>

  <rect x="280" y="22" width="56" height="18" rx="9" fill="#818CF8" opacity="0.12"/>
  <text x="308" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#818CF8">Total</text>
  <rect x="342" y="22" width="46" height="18" rx="9" fill="#F87171" opacity="0.12"/>
  <text x="365" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#F87171">8.x</text>
  <rect x="394" y="22" width="46" height="18" rx="9" fill="#FBBF24" opacity="0.12"/>
  <text x="417" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FBBF24">7.x</text>

  <rect class="release-band" x="843.0" y="48.0" width="22" height="146.0" rx="11" fill="#A78BFA"/>
  <text x="774.0" y="66.0" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#A78BFA">metadata updates before daily points</text>

  <line class="grid" x1="280.0" y1="194.0" x2="854.0" y2="194.0" stroke="#30363d" stroke-width="1" opacity="0.25"/><text x="270.0" y="198.0" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">0</text><line class="grid" x1="280.0" y1="157.5" x2="854.0" y2="157.5" stroke="#30363d" stroke-width="1" opacity="0.25"/><text x="270.0" y="161.5" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">122</text><line class="grid" x1="280.0" y1="121.0" x2="854.0" y2="121.0" stroke="#30363d" stroke-width="1" opacity="0.25"/><text x="270.0" y="125.0" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">244</text><line class="grid" x1="280.0" y1="84.5" x2="854.0" y2="84.5" stroke="#30363d" stroke-width="1" opacity="0.25"/><text x="270.0" y="88.5" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">365</text><line class="grid" x1="280.0" y1="48.0" x2="854.0" y2="48.0" stroke="#30363d" stroke-width="1" opacity="0.25"/><text x="270.0" y="52.0" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">487</text>

  <path d="M 280.0 194.0 280.0 58.8 L 375.7 168.5 L 471.3 184.7 L 567.0 188.9 L 662.7 191.9 L 758.3 190.7 L 854.0 178.4 L 854.0 194.0 Z" fill="#818CF8" opacity="0.08"/>
  <path class="total-line" pathLength="100" d="M 280.0 58.8 L 375.7 168.5 L 471.3 184.7 L 567.0 188.9 L 662.7 191.9 L 758.3 190.7 L 854.0 178.4" fill="none" stroke="#818CF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="v8-line" pathLength="100" d="M 280.0 194.0 L 375.7 194.0 L 471.3 194.0 L 567.0 194.0 L 662.7 194.0 L 758.3 194.0 L 854.0 194.0" fill="none" stroke="#F87171" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="v7-line" pathLength="100" d="M 280.0 58.8 L 375.7 168.5 L 471.3 184.7 L 567.0 188.9 L 662.7 191.9 L 758.3 190.7 L 854.0 178.4" fill="none" stroke="#FBBF24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

  <circle class="dot-total" cx="854.0" cy="178.4" r="5" fill="#818CF8"/>
  <circle class="dot-v8" cx="854.0" cy="194.0" r="4.5" fill="#F87171"/>
  <circle class="dot-v7" cx="854.0" cy="178.4" r="4.5" fill="#FBBF24"/>

  <text x="280.0" y="216.0" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Apr 28</text>
  <text x="854.0" y="216.0" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">May 4 data</text>
  <text x="854.0" y="232.0" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Peak 7.x day: 451 installs on 04/28</text>
</svg>