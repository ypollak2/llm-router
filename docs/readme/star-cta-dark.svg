<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 90" fill="none">
  <style>
    @keyframes cursorTap {
      0%, 12%, 100% { transform: translate(0px, 0px) scale(1); }
      18% { transform: translate(-3px, -3px) scale(1); }
      24% { transform: translate(-10px, -10px) scale(0.96); }
      30% { transform: translate(-3px, -3px) scale(1); }
    }
    @keyframes borderGlow {
      0%, 100% { stroke-opacity: 0.45; }
      50% { stroke-opacity: 1; }
    }
    @keyframes sparkle {
      0%, 18%, 100% { opacity: 0; transform: scale(0.6); }
      28%, 46% { opacity: 1; transform: scale(1); }
      60% { opacity: 0; transform: scale(1.2); }
    }
    .button-border { animation: borderGlow 3s ease-in-out infinite; }
    .cursor { animation: cursorTap 3.4s ease-in-out infinite; transform-origin: 56px 46px; }
    .spark-1 { animation: sparkle 3.4s ease-in-out infinite; transform-origin: 0 0; }
    .spark-2 { animation: sparkle 3.4s ease-in-out 0.12s infinite; transform-origin: 0 0; }
  </style>

  <rect width="420" height="90" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Star button -->
  <g transform="translate(18 14)">
    <rect class="button-border" x="0" y="0" width="150" height="44" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.2"/>
    <g transform="translate(14 10)">
      <path d="M14 1.4l3.7 7.5 8.3 1.2-6 5.8 1.4 8.2L14 20.2 6.6 24.1l1.4-8.2-6-5.8 8.3-1.2L14 1.4z"
            fill="#21262d" stroke="#8b949e" stroke-width="1">
        <animate attributeName="fill" values="#21262d;#21262d;#FBBF24;#FBBF24;#21262d" dur="3.4s" repeatCount="indefinite"/>
        <animate attributeName="stroke" values="#8b949e;#8b949e;#FBBF24;#FBBF24;#8b949e" dur="3.4s" repeatCount="indefinite"/>
      </path>
      <text x="34" y="16" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#e6edf3">Star on GitHub</text>
    </g>

    <g class="spark-1" opacity="0">
      <circle cx="36" cy="-2" r="2.5" fill="#FBBF24"/>
      <circle cx="24" cy="-6" r="1.5" fill="#818CF8"/>
    </g>
    <g class="spark-2" opacity="0">
      <circle cx="136" cy="-4" r="2" fill="#34D399"/>
      <circle cx="146" cy="6" r="1.4" fill="#FBBF24"/>
    </g>

    <g class="cursor" transform="translate(110 26)">
      <path d="M0 0l16 7-6 3 3 10-4 1-3-10-5 4V0z" fill="#e6edf3" opacity="0.85"/>
    </g>
  </g>

  <!-- Text -->
  <g transform="translate(190 14)">
    <text x="0" y="18" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">If llm-router saves you money,</text>
    <text x="0" y="38" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">send a star back.</text>
    <text x="0" y="58" font-family="system-ui, sans-serif" font-size="12" fill="#FBBF24" font-weight="600">★★★★★</text>
  </g>
</svg>
