<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 890 240" fill="none">
  <style>
    @keyframes panelIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.16); opacity: 1; }
    }
    @keyframes launchGlow {
      0%, 100% { opacity: 0.05; }
      50% { opacity: 0.14; }
    }
    @keyframes gridFade {
      0%, 100% { opacity: 0.22; }
      50% { opacity: 0.36; }
    }
    .panel { animation: panelIn 0.55s ease-out both; }
    .grid { animation: gridFade 4s ease-in-out infinite; }
    .total-line {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawLine 1.5s ease-out 0.05s forwards;
    }
    .v7-line {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawLine 1.5s ease-out 0.22s forwards;
    }
    .v6-line {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawLine 1.5s ease-out 0.38s forwards;
    }
    .launch-band { animation: launchGlow 3.2s ease-in-out infinite; }
    .dot-total { animation: pulseDot 2.4s ease-in-out infinite; transform-origin: 854.0px 188.5px; }
    .dot-v7 { animation: pulseDot 2.4s ease-in-out 0.4s infinite; transform-origin: 854.0px 189.9px; }
    .dot-v6 { animation: pulseDot 2.4s ease-in-out 0.8s infinite; transform-origin: 854.0px 193.2px; }
  </style>

  <rect class="panel" width="890" height="240" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="1" y="1" width="888" height="238" rx="15" fill="none" stroke="#30363d" stroke-opacity="0.35"/>

  <rect x="24" y="22" width="220" height="196" rx="14" fill="#0d1117" stroke="#30363d" stroke-opacity="0.6"/>
  <text x="42" y="54" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b949e">PYPI MOMENTUM</text>
  <text x="42" y="84" font-family="system-ui, sans-serif" font-size="34" font-weight="800" fill="#e6edf3">37.9k</text>
  <text x="42" y="106" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">legacy installs shown from Mar 29 to May 4</text>
  <text x="42" y="130" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Daily Pepy curve for the pre-rename package,</text>
  <text x="42" y="147" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">with the 6.x → 7.x handoff highlighted.</text>

  <rect x="42" y="166" width="78" height="26" rx="13" fill="#FBBF24" opacity="0.12" stroke="#FBBF24" stroke-width="0.8"/>
  <text x="81" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FBBF24">4.4k</text>
  <text x="81" y="201" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">7.x</text>

  <rect x="132" y="166" width="78" height="26" rx="13" fill="#34D399" opacity="0.12" stroke="#34D399" stroke-width="0.8"/>
  <text x="171" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#34D399">7.2k</text>
  <text x="171" y="201" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">6.x</text>

  <text x="42" y="217" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">Peak 7.x day: 813 installs on 04/22</text>

  <text x="280" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b949e">INTERACTIVE PEPY SPLIT</text>
  <text x="280" y="214" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">Total, 7.x, and 6.x daily downloads on the legacy package before the rename to llm-routing.</text>

  <rect x="280" y="22" width="56" height="18" rx="9" fill="#818CF8" opacity="0.12"/>
  <text x="308" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#818CF8">Total</text>
  <rect x="342" y="22" width="46" height="18" rx="9" fill="#FBBF24" opacity="0.12"/>
  <text x="365" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FBBF24">7.x</text>
  <rect x="394" y="22" width="46" height="18" rx="9" fill="#34D399" opacity="0.12"/>
  <text x="417" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#34D399">6.x</text>

  <rect class="launch-band" x="635.7" y="48.0" width="22" height="146.0" rx="11" fill="#A78BFA"/>
  <text x="662.7" y="66.0" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#A78BFA">7.x lands</text>

  <line class="grid" x1="280.0" y1="194.0" x2="854.0" y2="194.0" stroke="#30363d" stroke-width="1" opacity="0.25"/><text x="270.0" y="198.0" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">0</text><line class="grid" x1="280.0" y1="157.5" x2="854.0" y2="157.5" stroke="#30363d" stroke-width="1" opacity="0.25"/><text x="270.0" y="161.5" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">916</text><line class="grid" x1="280.0" y1="121.0" x2="854.0" y2="121.0" stroke="#30363d" stroke-width="1" opacity="0.25"/><text x="270.0" y="125.0" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">1.8k</text><line class="grid" x1="280.0" y1="84.5" x2="854.0" y2="84.5" stroke="#30363d" stroke-width="1" opacity="0.25"/><text x="270.0" y="88.5" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">2.7k</text><line class="grid" x1="280.0" y1="48.0" x2="854.0" y2="48.0" stroke="#30363d" stroke-width="1" opacity="0.25"/><text x="270.0" y="52.0" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">3.7k</text>

