      <text x="336" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">Premium models only when</text>
      <text x="336" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">the task truly needs it.</text>
    </g>
    <g opacity="0" style="animation: cardFadeIn 0.5s ease-out 0.3s both;">
