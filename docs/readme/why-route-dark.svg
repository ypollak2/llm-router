<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 890 150" fill="none">
  <style>
    @keyframes cardFadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
  
    <g opacity="0" style="animation: cardFadeIn 0.5s ease-out 0.0s both;">
