      <text x="772" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#818CF8">Zero Config</text>
      <text x="772" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">Works out of the box with</text>
