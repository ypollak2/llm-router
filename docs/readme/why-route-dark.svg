      <text x="554" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">No more rate-limit walls.</text>
    </g>
    <g opacity="0" style="animation: cardFadeIn 0.5s ease-out 0.44999999999999996s both;">
