<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 890 200" fill="none">
  <style>
    @keyframes countUp {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes barGrow {
      0% { transform: scaleX(0); }
      100% { transform: scaleX(1); }
    }
    @keyframes shimmer {
      0% { opacity: 0.75; }
      50% { opacity: 1; }
      100% { opacity: 0.75; }
    }
    @keyframes numberPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .big-stat { animation: countUp 0.8s ease-out both, numberPulse 4s ease-in-out 1s infinite; }
    .bar-free { transform-origin: left center; animation: barGrow 0.8s ease-out 0.2s both; }
    .bar-budget { transform-origin: left center; animation: barGrow 0.8s ease-out 0.5s both; }
    .bar-premium { transform-origin: left center; animation: barGrow 0.8s ease-out 0.8s both; }
    .bar-label { animation: countUp 0.5s ease-out 1.2s both; }
    .shimmer { animation: shimmer 3s ease-in-out infinite; }
  </style>

  <rect width="890" height="200" rx="14" fill="#f6f8fa" stroke="#d1d9e0" stroke-width="1"/>

  <!-- Left: big stat with pulse -->
  <text x="100" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#656d76" opacity="0.8">PROVEN SAVINGS</text>
  <g class="big-stat">
    <text x="100" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="58" font-weight="800" fill="#06B6D4">87%</text>
  </g>
  <text x="100" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#656d76">cost reduction</text>
  <text x="100" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#656d76">$6.95 vs $50-60 baseline</text>
  <text x="100" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#656d76">22.6M tokens &middot; 51 releases</text>

  <!-- Divider with gradient -->
  <line x1="210" y1="30" x2="210" y2="170" stroke="#d1d9e0" stroke-width="1" opacity="0.5"/>

  <!-- Right: token distribution -->
  <text x="550" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#656d76" opacity="0.8">TOKEN DISTRIBUTION</text>

  <!-- Animated stacked bars -->
  <g class="bar-free">
    <rect x="240" y="60" width="186" height="36" rx="6" fill="#10B981" class="shimmer"/>
    <text x="333" y="83" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">31% Free</text>
  </g>
  <g class="bar-budget">
    <rect x="426" y="60" width="228" height="36" fill="#F59E0B" class="shimmer"/>
    <text x="540" y="83" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">38% Budget</text>
  </g>
  <g class="bar-premium">
    <rect x="654" y="60" width="186" height="36" rx="6" fill="#EF4444" class="shimmer"/>
    <text x="747" y="83" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">31% Premium</text>
  </g>

  <!-- Labels under bar (fade in after bars) -->
  <g class="bar-label">
    <text x="333" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#10B981">7.0M tokens</text>
    <text x="333" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#10B981">$0.00</text>
    <text x="333" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#656d76">Ollama + Codex</text>
  </g>
  <g class="bar-label">
    <text x="540" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#F59E0B">8.6M tokens</text>
    <text x="540" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#F59E0B">$2.82</text>
    <text x="540" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#656d76">Flash + GPT-4o-mini</text>
  </g>
  <g class="bar-label">
    <text x="747" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#EF4444">7.0M tokens</text>
    <text x="747" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#EF4444">$4.13</text>
    <text x="747" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#656d76">GPT-4o + Claude</text>
  </g>

  <text x="550" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#656d76">Annualized: ~$180/yr vs $1,500/yr baseline</text>
</svg>