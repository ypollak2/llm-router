<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 890 200" fill="none">
  <defs>
    <linearGradient id="savingsBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="31%" stop-color="#34D399"/>
      <stop offset="31%" stop-color="#FBBF24"/>
      <stop offset="69%" stop-color="#FBBF24"/>
      <stop offset="69%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
  </defs>

  <rect width="890" height="200" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Left: big stat -->
  <text x="100" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">PROVEN SAVINGS</text>
  <text x="100" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="56" font-weight="800" fill="#22D3EE">87%</text>
  <text x="100" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">cost reduction</text>
  <text x="100" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">$6.95 vs $50-60 baseline</text>
  <text x="100" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">22.6M tokens · 51 releases</text>

  <!-- Divider -->
  <line x1="210" y1="25" x2="210" y2="175" stroke="#30363d" stroke-width="1"/>

  <!-- Right: token distribution bar -->
  <text x="550" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#8b949e">TOKEN DISTRIBUTION</text>

  <!-- Stacked bar -->
  <rect x="240" y="60" width="186" height="36" rx="6" fill="#34D399" opacity="0.85"/>
  <rect x="426" y="60" width="228" height="36" rx="0" fill="#FBBF24" opacity="0.85"/>
  <rect x="654" y="60" width="186" height="36" rx="6" fill="#F87171" opacity="0.85"/>

  <text x="333" y="83" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">31% Free</text>
  <text x="540" y="83" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">38% Budget</text>
  <text x="747" y="83" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">31% Premium</text>

  <!-- Labels under bar -->
  <text x="333" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#34D399">7.0M tokens</text>
  <text x="333" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#34D399">$0.00</text>
  <text x="333" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Ollama + Codex</text>

  <text x="540" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FBBF24">8.6M tokens</text>
  <text x="540" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FBBF24">$2.82</text>
  <text x="540" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Flash + GPT-4o-mini</text>

  <text x="747" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#F87171">7.0M tokens</text>
  <text x="747" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#F87171">$4.13</text>
  <text x="747" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">GPT-4o + Claude</text>

  <!-- Annualized -->
  <text x="550" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e">Annualized: ~$180/yr vs $1,500/yr baseline</text>
