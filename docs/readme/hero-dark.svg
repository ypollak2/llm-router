<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.12; }
      50% { opacity: 0.22; }
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 2px #818CF800); }
      50% { filter: drop-shadow(0 0 6px #818CF844); }
    }
    @keyframes tierFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .classifier-bg { animation: pulse 3s ease-in-out infinite; }
    .classifier-box { animation: glow 3s ease-in-out infinite; }
    .tier-free { animation: tierFadeIn 0.5s ease-out 0.3s both; }
    .tier-budget { animation: tierFadeIn 0.5s ease-out 0.5s both; }
    .tier-premium { animation: tierFadeIn 0.5s ease-out 0.7s both; }
  </style>

  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="routeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
    <marker id="arrowFree" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#34D399"/></marker>
    <marker id="arrowBudget" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#FBBF24"/></marker>
    <marker id="arrowPremium" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#F87171"/></marker>
    <!-- Motion paths for routing dots -->
    <path id="pathInput" d="M200,168 L260,168" fill="none"/>
    <path id="pathFree" d="M430,148 L520,148" fill="none"/>
    <path id="pathBudget" d="M430,168 L520,208" fill="none"/>
    <path id="pathPremium" d="M430,188 L520,268" fill="none"/>
  </defs>

  <rect width="900" height="320" rx="16" fill="url(#heroBg)"/>
  <rect x="1" y="1" width="898" height="318" rx="15" fill="none" stroke="#30363d" stroke-width="1" opacity="0.5"/>

  <!-- Title -->
  <text x="450" y="62" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="-1">LLM Router</text>
  <text x="450" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#8b949e">Route every AI call to the cheapest model that can do the job well.</text>

  <!-- User prompt box -->
  <rect x="60" y="140" width="140" height="56" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="130" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#8b949e">User Prompt</text>
  <text x="130" y="182" text-anchor="middle" font-family="monospace" font-size="10" fill="#e6edf3">"fix the auth bug"</text>

  <!-- Arrow: Prompt → Classifier (horizontal) -->
  <line x1="200" y1="168" x2="260" y2="168" stroke="#818CF8" stroke-width="2" stroke-opacity="0.3"/>
  <circle r="3" fill="#818CF8">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0s"><mpath href="#pathInput"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle r="3" fill="#818CF8">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.7s"><mpath href="#pathInput"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2s" repeatCount="indefinite" begin="0.7s"/>
  </circle>

  <!-- Classifier box with glow -->
  <rect class="classifier-bg" x="270" y="132" width="160" height="72" rx="12" fill="#818CF8"/>
  <rect class="classifier-box" x="270" y="132" width="160" height="72" rx="12" fill="none" stroke="#818CF8" stroke-width="1.5"/>
  <text x="350" y="157" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#818CF8">Complexity</text>
  <text x="350" y="174" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#818CF8">Classifier</text>
  <text x="350" y="194" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">heuristic + local LLM</text>

  <!-- Route: Classifier → Free (horizontal) -->
  <line x1="430" y1="148" x2="520" y2="148" stroke="#34D399" stroke-width="2" stroke-opacity="0.3" marker-end="url(#arrowFree)"/>
  <circle r="3" fill="#34D399">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0s"><mpath href="#pathFree"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2s" repeatCount="indefinite" begin="0s"/>
  </circle>

  <!-- Route: Classifier → Budget (diagonal) -->
  <line x1="430" y1="168" x2="520" y2="208" stroke="#FBBF24" stroke-width="2" stroke-opacity="0.3" marker-end="url(#arrowBudget)"/>
  <circle r="3" fill="#FBBF24">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.7s"><mpath href="#pathBudget"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2s" repeatCount="indefinite" begin="0.7s"/>
  </circle>

  <!-- Route: Classifier → Premium (steeper diagonal) -->
  <line x1="430" y1="188" x2="520" y2="268" stroke="#F87171" stroke-width="2" stroke-opacity="0.3" marker-end="url(#arrowPremium)"/>
  <circle r="3" fill="#F87171">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1.4s"><mpath href="#pathPremium"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2s" repeatCount="indefinite" begin="1.4s"/>
  </circle>

  <!-- Free tier -->
  <g class="tier-free">
    <rect x="530" y="126" width="200" height="44" rx="8" fill="#34D399" opacity="0.15" stroke="#34D399" stroke-width="1.5"/>
    <circle cx="548" cy="148" r="6" fill="#34D399"/>
    <text x="562" y="144" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#34D399">Simple</text>
    <text x="562" y="160" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Ollama / Haiku / Gemini Flash</text>
    <text x="740" y="152" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#34D399">FREE</text>
  </g>

  <!-- Budget tier -->
  <g class="tier-budget">
    <rect x="530" y="186" width="200" height="44" rx="8" fill="#FBBF24" opacity="0.15" stroke="#FBBF24" stroke-width="1.5"/>
    <circle cx="548" cy="208" r="6" fill="#FBBF24"/>
    <text x="562" y="204" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FBBF24">Moderate</text>
    <text x="562" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">GPT-4o / Gemini Pro</text>
    <text x="740" y="212" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FBBF24">$0.01</text>
  </g>

  <!-- Premium tier -->
  <g class="tier-premium">
    <rect x="530" y="246" width="200" height="44" rx="8" fill="#F87171" opacity="0.15" stroke="#F87171" stroke-width="1.5"/>
    <circle cx="548" cy="268" r="6" fill="#F87171"/>
    <text x="562" y="264" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#F87171">Complex</text>
    <text x="562" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Claude Opus / o3</text>
    <text x="740" y="272" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#F87171">$$$</text>
  </g>

  <!-- Cost gradient bar -->
  <rect x="770" y="130" width="4" height="156" rx="2" fill="url(#routeGrad)" opacity="0.7"/>
  <text x="786" y="150" font-family="system-ui, sans-serif" font-size="12" fill="#34D399">$</text>
  <text x="786" y="282" font-family="system-ui, sans-serif" font-size="12" fill="#F87171">$$$$</text>

  <!-- Bottom stat pills (static — no distracting float) -->
  <g>
    <rect x="145" y="260" width="120" height="28" rx="14" fill="#818CF8" opacity="0.1" stroke="#818CF8" stroke-width="0.5"/>
    <text x="205" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#818CF8">60 MCP Tools</text>
  </g>
  <g>
    <rect x="285" y="260" width="120" height="28" rx="14" fill="#22D3EE" opacity="0.1" stroke="#22D3EE" stroke-width="0.5"/>
    <text x="345" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#22D3EE">20+ Providers</text>
  </g>
  <g>
    <rect x="425" y="260" width="100" height="28" rx="14" fill="#34D399" opacity="0.1" stroke="#34D399" stroke-width="0.5"/>
    <text x="475" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#34D399">60&#8211;80% saved</text>
  </g>
</svg>