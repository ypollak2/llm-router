<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Central node -->
  <circle cx="60" cy="60" r="12" fill="url(#arrow)" opacity="0.95"/>
  <!-- Top-right branch -->
  <line x1="68" y1="52" x2="88" y2="32" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="90" cy="30" r="7" fill="white" opacity="0.8"/>
  <!-- Right branch -->
  <line x1="72" y1="60" x2="92" y2="60" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="95" cy="60" r="7" fill="white" opacity="0.7"/>
  <!-- Bottom-right branch -->
  <line x1="68" y1="68" x2="88" y2="88" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <circle cx="90" cy="90" r="7" fill="white" opacity="0.6"/>
  <!-- Left input arrow -->
  <line x1="18" y1="60" x2="46" y2="60" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <polygon points="44,54 54,60 44,66" fill="white"/>
</svg>
