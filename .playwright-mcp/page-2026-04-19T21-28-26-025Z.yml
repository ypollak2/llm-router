                    - link "claude-pace" [ref=e606] [cursor=pointer]:
                      - /url: https://github.com/Astro-Han/claude-pace
                    - text: by
                    - link "Astro-Han" [ref=e607] [cursor=pointer]:
                      - /url: https://github.com/Astro-Han
                    - text: "- A lightweight Bash + jq statusline for Claude Code that displays rate limit pace delta (burn rate vs. time remaining), 5h/7d usage percentage, context window usage, git branch and diff stats. Compares current consumption rate against time remaining in each rate limit window to indicate whether quota is being used faster or slower than the window allows. Single file with no external dependencies beyond jq."
                  - listitem [ref=e608]:
                    - link "Clawd on Desk" [ref=e609] [cursor=pointer]:
                      - /url: https://github.com/rullerzhou-afk/clawd-on-desk
                    - text: by
                    - link "Ruller_Lulu" [ref=e610] [cursor=pointer]:
                      - /url: https://github.com/rullerzhou-afk
                    - text: "- A desktop pet that reacts to your Claude Code sessions in real-time — thinking, typing, juggling, sleeping, and more. Yep. It's undeniably endearing. And at the end of the day, isn't that what Claude Code is all about?"
                  - listitem [ref=e611]:
                    - link "ccxray" [ref=e612] [cursor=pointer]:
                      - /url: https://github.com/lis186/ccxray
                    - text: by
                    - link "lis186" [ref=e613] [cursor=pointer]:
                      - /url: https://github.com/lis186
                    - text: "- A transparent HTTP proxy and real-time dashboard that sits between Claude Code and the Anthropic API. Captures every request and response without configuration, presenting them in a Miller-column interface with session grouping, token/cost tracking, and context-window visualization."
                  - listitem [ref=e614]:
                    - link "Encyclopedia of Agentic Coding Patterns" [ref=e615] [cursor=pointer]:
                      - /url: https://aipatternbook.com
                    - text: by
                    - link "Wolf McNally" [ref=e616] [cursor=pointer]:
                      - /url: https://github.com/wolfmcnally
                    - text: "- A freely available reference covering 190+ patterns for AI-assisted software development (and actually a whole bunch of related technical topics) from foundational concepts through agentic construction patterns, governance, testing, and socio-technical systems. Each entry follows a consistent pattern-language format with Context, Problem, Forces, Solution, Consequences, and Related Patterns. Opinionated and erudiate, which is actually good for an \"encyclopedia\" in some ways."
