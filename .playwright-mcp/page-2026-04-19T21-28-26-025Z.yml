                - list [ref=e710]:
                  - listitem [ref=e711]:
                    - link "AgentSys" [ref=e712] [cursor=pointer]:
                      - /url: https://github.com/avifenesh/agentsys
                    - text: by
                    - link "avifenesh" [ref=e713] [cursor=pointer]:
                      - /url: https://github.com/avifenesh
                    - text: "- Workflow automation system for Claude with a group of useful plugins, agents, and skills. Automates task-to-production workflows, PR management, code cleanup, performance investigation, drift detection, and multi-agent code review. Includes"
                    - link "agnix" [ref=e714] [cursor=pointer]:
                      - /url: https://github.com/avifenesh/agnix
                    - text: for linting agent configurations. Built on thousands of lines of code with thousands of tests. Uses deterministic detection (regex, AST) with LLM judgment for efficiency. Used on many production systems.
                  - listitem [ref=e715]:
                    - link "AI Agent, AI Spy" [ref=e716] [cursor=pointer]:
                      - /url: https://youtu.be/0ANECpNdt-4
                    - text: by
                    - link "Whittaker & Tiwari" [ref=e717] [cursor=pointer]:
                      - /url: https://signalfoundation.org/
                    - text: "- Members from the Signal Foundation with some really great tips and tricks on how to turn your operating system into an instrument of total surveillance, and why some companies are doing this really awesome thing. [warning: YouTube link]."
                  - listitem [ref=e718]:
                    - link "Book Factory" [ref=e719] [cursor=pointer]:
                      - /url: https://github.com/robertguss/claude-skills
                    - text: by
                    - link "Robert Guss" [ref=e720] [cursor=pointer]:
                      - /url: https://github.com/robertguss
                    - text: "- A comprehensive pipeline of Skills that replicates traditional publishing infrastructure for nonfiction book creation using specialized Claude skills."
                  - listitem [ref=e721]:
                    - link "cc-devops-skills" [ref=e722] [cursor=pointer]:
                      - /url: https://github.com/akin-ozer/cc-devops-skills
                    - text: by
                    - link "akin-ozer" [ref=e723] [cursor=pointer]:
                      - /url: https://github.com/akin-ozer
                    - text: "- Immensely detailed set of skills for DevOps Engineers (or anyone who has to deploy code, really). Works with validations, generators, shell scripts and CLI tools to create high quality IaC code for about any platform you've ever struggled painfully to work with. Worth downloading even just as a source of documentation."
                  - listitem [ref=e724]:
                    - link "Claude Code Agents" [ref=e725] [cursor=pointer]:
                      - /url: https://github.com/undeadlist/claude-code-agents
                    - text: by
                    - link "Paul - UndeadList" [ref=e726] [cursor=pointer]:
                      - /url: https://github.com/undeadlist
                    - text: "- Comprehensive E2E development workflow with helpful Claude Code subagent prompts for solo devs. Run multiple auditors in parallel, automate fix cycles with micro-checkpoint protocols, and do browser-based QA. Includes strict protocols to prevent AI going rogue."
                  - listitem [ref=e727]:
                    - link "Claude Codex Settings" [ref=e728] [cursor=pointer]:
                      - /url: https://github.com/fcakyon/claude-codex-settings
                    - text: by
                    - link "fatih akyon" [ref=e729] [cursor=pointer]:
                      - /url: https://github.com/fcakyon
                    - text: "- A well-organized, well-written set of plugins covering core developer activities, such as working with common cloud platforms like GitHub, Azure, MongoDB, and popular services such as Tavily, Playwright, and more. Clear, not overly-opinionated, and compatible with a few other providers."
                  - listitem [ref=e730]:
                    - link "Claude Mountaineering Skills" [ref=e731] [cursor=pointer]:
                      - /url: https://github.com/dreamiurg/claude-mountaineering-skills
                    - text: by
                    - link "Dmytro Gaivoronsky" [ref=e732] [cursor=pointer]:
                      - /url: https://github.com/dreamiurg
                    - text: "- Claude Code skill that automates mountain route research for North American peaks. Aggregates data from 10+ mountaineering sources like Mountaineers.org, PeakBagger.com and SummitPost.com to generate detailed route beta reports with weather, avalanche conditions, and trip reports."
                  - listitem [ref=e733]:
                    - link "Claude Scientific Skills" [ref=e734] [cursor=pointer]:
                      - /url: https://github.com/K-Dense-AI/claude-scientific-skills
                    - text: by
                    - link "K-Dense" [ref=e735] [cursor=pointer]:
                      - /url: https://github.com/K-Dense-AI/
                    - text: "- \"A set of ready-to-use Agent Skills for research, science, engineering, analysis, finance and writing.\" That's their description - modest, simple. That's how you can tell this is really one of the best skills repos on GitHub. If you've ever thought about getting a PhD... just read all of these documents instead. Also I think it IS an AI agent or something? Awesome."
                  - listitem [ref=e736]:
                    - link "Codebase to Course" [ref=e737] [cursor=pointer]:
                      - /url: https://github.com/zarazhangrui/codebase-to-course
                    - text: by
                    - link "Zara Zhang" [ref=e738] [cursor=pointer]:
                      - /url: https://github.com/zarazhangrui
                    - text: "- A Claude Code skill that turns any codebase into a beautiful, interactive single-page HTML course for non-technical vibe coders."
                  - listitem [ref=e739]:
                    - link "Codex Skill" [ref=e740] [cursor=pointer]:
                      - /url: https://github.com/skills-directory/skill-codex
                    - text: by
                    - link "klaudworks" [ref=e741] [cursor=pointer]:
                      - /url: https://github.com/klaudworks
                    - text: "- Enables users to prompt codex from claude code. Unlike the raw codex mcp server, this skill infers parameters such as model, reasoning effort, sandboxing from your prompt or asks you to specify them. It also simplifies continuing prior codex sessions so that codex can continue with the prior context."
                  - listitem [ref=e742]:
                    - link "Compound Engineering Plugin" [ref=e743] [cursor=pointer]:
                      - /url: https://github.com/EveryInc/compound-engineering-plugin
                    - text: by
                    - link "EveryInc" [ref=e744] [cursor=pointer]:
                      - /url: https://github.com/EveryInc
                    - text: "- A very pragmatic set of well-designed agents, skills, and commands, built around a discipline of turning past mistakes and errors into lessons and opportunities for future growth and improvement. Good documentation."
                  - listitem [ref=e745]:
                    - link "Context Engineering Kit" [ref=e746] [cursor=pointer]:
                      - /url: https://github.com/NeoLabHQ/context-engineering-kit
                    - text: by
                    - link "Vlad Goncharov" [ref=e747] [cursor=pointer]:
                      - /url: https://github.com/LeoVS09
                    - text: "- Hand-crafted collection of advanced context engineering techniques and patterns with minimal token footprint focused on improving agent result quality."
                  - listitem [ref=e748]:
                    - link "Everything Claude Code" [ref=e749] [cursor=pointer]:
                      - /url: https://github.com/affaan-m/everything-claude-code
                    - text: by
                    - link "Affaan Mustafa" [ref=e750] [cursor=pointer]:
                      - /url: https://github.com/affaan-m/
                    - text: "- Top-notch, well-written resources covering \"just about everything\" from core engineering domains. What's nice about this \"everything-\" store is most of the resources have significant standalone value and unlike some all-encompassing frameworks, although you can opt in to the author's own specific workflow patterns if you choose, the individual resources offer exemplary patterns in (just about) every Claude Code feature you can find (apologies to the Output Styles devotees)."
                  - listitem [ref=e751]:
                    - link "Fullstack Dev Skills" [ref=e752] [cursor=pointer]:
                      - /url: https://github.com/jeffallan/claude-skills
                    - text: by
                    - link "jeffallan" [ref=e753] [cursor=pointer]:
                      - /url: https://github.com/jeffallan
                    - text: "- A comprehensive Claude Code plugin with 65 specialized skills covering full-stack development across a wide range of specific frameworks. Features 9 project workflow commands for Jira/Confluence integration and, notably, an interesting approach to context engineering via a"
                    - code [ref=e754]: /common-ground
                    - text: command that surfaces Claude's hidden assumptions about your project. This is a smart thing to do.
                  - listitem [ref=e755]:
                    - link "read-only-postgres" [ref=e756] [cursor=pointer]:
                      - /url: https://github.com/jawwadfirdousi/agent-skills
                    - text: by
                    - link "jawwadfirdousi" [ref=e757] [cursor=pointer]:
                      - /url: https://github.com/jawwadfirdousi
                    - text: "- Read-only PostgreSQL query skill for Claude Code. Executes SELECT/SHOW/EXPLAIN/WITH queries across configured databases with strict validation, timeouts, and row limits. Supports multiple connections with descriptions for database selection."
                  - listitem [ref=e758]:
                    - link "Superpowers" [ref=e759] [cursor=pointer]:
                      - /url: https://github.com/obra/superpowers
                    - text: by
                    - link "Jesse Vincent" [ref=e760] [cursor=pointer]:
                      - /url: https://github.com/obra
                    - text: "- A strong bundle of core competencies for software engineering, with good coverage of a large portion of the SDLC - from planning, reviewing, testing, debugging... Well written, well organized, and adaptable. The author refers to them as \"superpowers\", but many of them are just consolidating engineering best practices - which sometimes does feel like a superpower when working with Claude Code."
                  - listitem [ref=e761]:
                    - link "Trail of Bits Security Skills" [ref=e762] [cursor=pointer]:
                      - /url: https://github.com/trailofbits/skills
                    - text: by
                    - link "Trail of Bits" [ref=e763] [cursor=pointer]:
                      - /url: https://github.com/trailofbits
                    - text: "- A very professional collection of over a dozen security-focused skills for code auditing and vulnerability detection. Includes skills for static analysis with CodeQL and Semgrep, variant analysis across codebases, fix verification, and differential code review."
                  - listitem [ref=e764]:
