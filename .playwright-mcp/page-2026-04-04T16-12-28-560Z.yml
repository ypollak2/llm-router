                - paragraph [ref=f3e355]: The dashboard follows a 'Liquid Glass' aesthetic, featuring high-contrast data visualizations and a focus on cost-performance mediation.
                - paragraph [ref=f3e356]: "Here are the four screens I've created:"
                - list [ref=f3e357]:
                  - listitem [ref=f3e358]:
                    - strong [ref=f3e359]: "Overview Dashboard:"
                    - text: A bird's-eye view of your routing infrastructure, featuring a 'Savings Velocity' gauge that highlights the economic impact of using local compute (Ollama) versus cloud providers. It also includes a Sankey diagram that maps your prompt prefixes (like
                    - code [ref=f3e360]: /gpt4
                    - text: or
                    - code [ref=f3e361]: /ollama
                    - text: ) directly to the destination model cluster.
                  - listitem [ref=f3e362]:
                    - strong [ref=f3e363]: "Model Performance:"
                    - text: Detailed telemetry across all backends, with real-time charts for TTFT (Time to First Token) and P95 latency. The 'Model Provider Benchmark' table allows for direct comparison of availability, throughput, and cost.
                  - listitem [ref=f3e364]:
                    - strong [ref=f3e365]: "Configuration & Keys:"
                    - text: A secure environment for managing your global
                    - code [ref=f3e366]: LLMROUTER_API_KEY
                    - text: and individual provider keys. It also features a real-time routing rule editor for fine-tuning prefix-based logic and model aliases.
                  - listitem [ref=f3e367]:
                    - strong [ref=f3e368]: "Logs & Analysis:"
                    - text: A high-fidelity log explorer with a 'Zero-UI' natural language search interface. You can click into any request to see the detailed payload, role rewriting results, and a full timing breakdown.
