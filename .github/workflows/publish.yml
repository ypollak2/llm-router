name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publisher

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra agno

      - name: Lint
        run: uv run ruff check src/

      - name: Run tests
        run: uv run pytest tests/ -q --ignore=tests/test_integration.py --timeout=30

  publish:
    name: Build and publish
    needs: test
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches pyproject.toml version
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG="${TAG_REF#v}"
          PKG=$(uv run python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "Tag version:     $TAG"
          echo "Package version: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "ERROR: git tag v$TAG does not match pyproject.toml version $PKG"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true

  github_release:
    name: Sync GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG="${TAG_REF#v}"
          python3 scripts/release_guard.py title --version "$TAG" > "$RUNNER_TEMP/release-title.txt"
          python3 scripts/release_guard.py notes --version "$TAG" --output "$RUNNER_TEMP/release-notes.md"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_REF: ${{ github.ref_name }}
        run: |
          TITLE="$(cat "$RUNNER_TEMP/release-title.txt")"
          if gh release view "$TAG_REF" >/dev/null 2>&1; then
            gh release edit "$TAG_REF" --title "$TITLE" --notes-file "$RUNNER_TEMP/release-notes.md"
          else
            gh release create "$TAG_REF" --title "$TITLE" --notes-file "$RUNNER_TEMP/release-notes.md"
          fi
