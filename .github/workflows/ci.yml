name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uvx ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: |
          output=$(timeout 90 uv run pytest tests/ -q \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_agno_integration.py \
            --timeout=30 2>&1)
          code=$?
          echo "$output"
          # exit 124 = timeout (aiosqlite non-daemon thread hangs pytest on exit).
          # Tests already printed "passed/failed" before the hang — use that as truth.
          if [ $code -eq 124 ]; then
            if echo "$output" | grep -qE "[0-9]+ passed" && ! echo "$output" | grep -qE "failed|error"; then
              echo "Note: pytest hung on exit (aiosqlite thread), all tests passed."
              exit 0
            fi
            echo "Timed out with test failures."
            exit 1
          fi
          exit $code
